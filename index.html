<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário Acessível</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <!-- O nav armazena o menu de navegação e usa aria-label para identificação -->
        <nav aria-label="Menu principal">
            <ul>
                <!-- aria-current="page" informa ao leitor de tela que estamos nesta página -->
                <li><a href="index.html" aria-current="page">Formulário de Cadastro</a></li>
                <li><a href="tabela.html">Cardápio Acessível</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <h1 id="form-title">Formulario de Cadastro</h1>
        <p id="form-desc">Preencha seus dados para se cadastrar.</p>
        <form aria-labelledby="form-title" aria-describedby="form-desc">
            <fieldset>
                <legend>Dados Pessoais</legend>
                <div>
                    <label for="nome">Nome Completo</label>
                    <input type="text" id="nome" name="nome" placeholder="Ex: Godofredo Cabral" required aria-required="true" autocomplete="name">
                </div>
                <div>
                    <label for="cpf">CPF</label>
                    <input type="text" id="cpf" name="cpf" placeholder="Ex: 000.000.000-00" required aria-required="true" aria-describedby="cpf-hint">
                    <span id="cpf-hint" class="visually-hidden" style="display:none;">Digite o CPF no formato 000.000.000-00</span>
                </div>
                <div>
                    <label for="data-nascimento">Data de Nascimento</label>
                    <input type="date" id="data-nascimento" name="data-nascimento" required aria-required="true" autocomplete="bday">
                </div>
                <div>
                    <label for="sexo">Sexo</label>
                    <select id="sexo" name="sexo" required aria-required="true">
                        <option value="" disabled selected>Selecione seu sexo</option>
                        <option value="feminino">Feminino</option>
                        <option value="masculino">Masculino</option>
                        <option value="outro">Outro / Prefiro não informar</option>
                    </select>
                </div>
            </fieldset>

            <fieldset>
                <legend>Dados de Contato</legend>
                <div>
                    <label for="email">E-mail</label>
                    <input type="email" id="email" name="email" placeholder="silva@gmail.com" required aria-required="true" autocomplete="email" aria-describedby="email-hint">
                </div>
                <div>
                    <label for="telefone">Telefone para Contato</label>
                    <input type="tel" id="telefone" name="telefone" placeholder="Ex: (11) 98888-8888" required aria-required="true" autocomplete="tel">
                </div>
                <div>
                    <label for="cep">CEP</label>
                    <input type="text" id="cep" name="cep" placeholder="Ex: 00000-000" required aria-required="true" autocomplete="postal-code">
                </div>
                <div>
                    <label for="endereco">Endereço Completo</label>
                    <input type="text" id="endereco" name="endereco" placeholder="Ex: Rua das Flores, 123" required aria-required="true" autocomplete="street-address">
                </div>
            </fieldset>

            <button type="submit" aria-label="Enviar formulário de cadastro">Enviar Cadastro</button>
        </form>
    </main>
</body>
</html>
